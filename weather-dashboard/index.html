<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Clima</title>
    <link rel="stylesheet" href="styles-weather.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Dashboard de Clima</h1>
            <p>Confira as condições climáticas em tempo real</p>
        </header>

        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Digite o nome da cidade..." 
                class="search-input"
            >
            <button id="searchBtn" class="search-btn">Buscar</button>
        </div>

        <div id="weatherContainer" class="weather-container">
            <!-- Dados do clima serão inseridos aqui -->
        </div>

        <div id="forecastContainer" class="forecast-container">
            <!-- Previsão de 5 dias será inserida aqui -->
        </div>

        <footer>
            <p>&copy; 2024 Dashboard de Clima - Dados fornecidos por OpenWeatherMap</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
